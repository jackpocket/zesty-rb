version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: monthly
      time: "12:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    groups:
      bundler:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      time: "12:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"
